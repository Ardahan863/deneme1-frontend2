<!DOCTYPE html>
<html>
  <body>
    <h1>Giriş Sistemi</h1>

    <div id="auth">
      <input id="email" placeholder="email" />
      <input id="password" type="password" placeholder="şifre" />

      <button onclick="register()">Kayıt Ol</button>
      <button onclick="login()">Giriş Yap</button>
    </div>

    <h2 id="welcome"></h2>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabase = createClient(
        "https://nbzrmamkorfujcmkmryb.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ienJtYW1rb3JmdWpjbWttcnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjEwNzksImV4cCI6MjA5MDczNzA3OX0.NCJnpBdMylHfo3fLx-fW-IHM1qw8Pz_wXLYjSe79W5o"
      );

      // SESSION CHECK
      const checkSession = async () => {
        const { data, error } = await supabase.auth.getSession();

        if (data.session) {
          document.getElementById("welcome").innerText =
            "Hoşgeldin: " + data.session.user.email;

          document.getElementById("auth").style.display = "none";
        }
      };

      checkSession();

      // REGISTER
      window.register = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { data, error } = await supabase.auth.signUp({
          email,
          password
        });

        console.log("REGISTER DATA:", data);
        console.log("REGISTER ERROR:", error);

        if (error) {
          alert("HATA: " + error.message);
          return;
        }

        if (data.user) {
          alert("Kayıt başarılı! Mail kontrol et.");
        } else {
          alert("Kullanıcı oluşmadı.");
        }
      };

      // LOGIN
      window.login = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        console.log("LOGIN DATA:", data);
        console.log("LOGIN ERROR:", error);

        if (error) {
          alert("HATA: " + error.message);
          return;
        }

        if (data.session) {
          document.getElementById("auth").style.display = "none";
          document.getElementById("welcome").innerText =
            "Hoşgeldin: " + data.user.email;
        } else {
          alert("Giriş başarısız");
        }
      };
    </script>
  </body>
</html>
